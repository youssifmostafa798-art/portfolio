name: portfolio
description: Premium portfolio for Youssif Mostafa, Flutter Mobile Application Developer.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2
  responsive_framework: ^1.5.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
